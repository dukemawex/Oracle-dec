name: oracledeck
region: nyc

services:
  - name: api
    github:
      repo: dukemawex/Oracle-dec
      branch: main
      deploy_on_push: true
    source_dir: apps/api
    environment_slug: node-js
    build_command: npm ci && npm run build
    run_command: node dist/index.js
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    health_check:
      http_path: /health
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${oracledeck-db.DATABASE_URL}
      - key: METACULUS_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: FRONTEND_URL
        scope: RUN_TIME
        value: https://oracle-dec.vercel.app
      - key: VERCEL_DEPLOY_HOOK_URL
        scope: RUN_TIME
        type: SECRET
      - key: PORT
        scope: RUN_TIME
        value: "8080"
      - key: NODE_ENV
        scope: RUN_TIME
        value: production

jobs:
  - name: sync-resolutions
    kind: SCHEDULED
    schedule: "0 2 * * *"
    github:
      repo: dukemawex/Oracle-dec
      branch: main
    source_dir: apps/api
    environment_slug: node-js
    build_command: npm ci && npm run build
    run_command: node dist/scripts/sync-resolutions.js
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${oracledeck-db.DATABASE_URL}
      - key: METACULUS_TOKEN
        scope: RUN_TIME
        type: SECRET

databases:
  - name: oracledeck-db
    engine: PG
    version: "16"
    production: false
